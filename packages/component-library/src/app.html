<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#1d3a2f" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Arimo:ital,wght@0,400..700;1,400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet" />
    <script>
      (() => {
        const storageKey = 'modular-app-theme-preference';
        const defaultPreference = {
          theme: 'paper',
          scale: 'medium',
          fontFamily: 'system',
          authBackgroundPattern: 'topography',
          appBackgroundPatternOpacity: 0.35
        };
        const darkThemes = new Set(['midnight', 'dark', 'forest', 'neon']);
        const storedFonts = {
          inter: '"Inter", ui-sans-serif, system-ui, -apple-system, sans-serif',
          arial: '"Arimo", Arial, "Helvetica Neue", Helvetica, sans-serif',
          poppins: '"Poppins", ui-sans-serif, system-ui, sans-serif',
          nunito: '"Nunito", ui-sans-serif, system-ui, sans-serif',
          system: 'ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif'
        };

        let preference = defaultPreference;

        try {
          const raw = window.localStorage.getItem(storageKey);
          if (raw) {
            preference = { ...defaultPreference, ...JSON.parse(raw) };
          }
        } catch {
          preference = defaultPreference;
        }

        const root = document.documentElement;
        root.dataset.theme = preference.theme;
        root.dataset.scale = preference.scale;
        root.dataset.font = preference.fontFamily;
        root.dataset.authPattern = preference.authBackgroundPattern;
        root.style.setProperty('--app-background-pattern-opacity', String(preference.appBackgroundPatternOpacity));
        root.style.setProperty('--font-family', storedFonts[preference.fontFamily] ?? storedFonts.system);
        root.classList.toggle('dark', darkThemes.has(preference.theme));
      })();
    </script>
    <style>
      html {
        font-family: var(--font-family, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif);
        background-color: oklch(0.985 0.006 85);
        color: oklch(0.23 0.012 262);
      }

      html[data-theme="dark"] {
        background-color: oklch(0.15 0.005 250);
        color: oklch(0.98 0.005 250);
      }

      html[data-theme="midnight"] {
        background-color: oklch(0.18 0.02 255);
        color: oklch(0.94 0.012 255);
      }

      html[data-theme="forest"] {
        background-color: oklch(0.97 0.013 145);
        color: oklch(0.24 0.018 150);
      }

      html[data-font="inter"] {
        font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
      }

      html[data-font="arial"] {
        font-family: "Arimo", Arial, "Helvetica Neue", Helvetica, sans-serif;
      }

      html[data-font="poppins"] {
        font-family: "Poppins", ui-sans-serif, system-ui, sans-serif;
      }

      html[data-font="nunito"] {
        font-family: "Nunito", ui-sans-serif, system-ui, sans-serif;
      }

      html[data-font="system"] {
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: transparent;
        color: inherit;
        font-family: inherit;
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
